name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying cyber-bunker-security → Coolify uuid=dso4s8og4kc88g40oc4gwggc"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=dso4s8og4kc88g40oc4gwggc&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
